<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converter Toolkit Pro</title>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --card2: #16213a; --accent: #38bdf8;
    --yellow: #facc15; --text: #e2e8f0; --muted: #94a3b8; --border: #334155;
    --green: #22c55e; --red: #f87171;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; background: var(--bg); color: var(--text); }
  h1 { color: var(--accent); margin-bottom: 4px; font-size: 1.8em; }
  .subtitle { color: var(--muted); margin-top: 0; margin-bottom: 24px; }
  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 10; }
  .tab-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 0.95em; transition: all .15s; }
  .tab-btn:hover { border-color: var(--accent); }
  .tab-btn.active { background: var(--accent); color: #0f172a; font-weight: bold; border-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .tool-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .tool-card h3 { margin: 0 0 4px; color: var(--yellow); font-size: 1.05em; }
  .tool-card p.desc { color: var(--muted); font-size: 0.85em; margin: 0 0 12px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 0.8em; color: var(--muted); margin-bottom: 4px; }
  .field input[type=text], .field input[type=number], .field input[type=password], .field textarea, .field select {
    width: 100%; padding: 8px 10px; background: var(--card2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 0.9em;
  }
  .field textarea { resize: vertical; min-height: 60px; font-family: monospace; }
  .field input[type=file] { width: 100%; font-size: 0.85em; color: var(--muted); }
  .field input[type=checkbox] { margin-right: 6px; }
  .run-btn { background: var(--accent); color: #0f172a; border: none; padding: 9px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9em; }
  .run-btn:hover { opacity: 0.85; }
  .run-btn:disabled { opacity: 0.5; cursor: wait; }
  .result { margin-top: 12px; }
  .result pre { background: #0b1220; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 0.8em; overflow-x: auto; max-height: 220px; white-space: pre-wrap; word-break: break-all; }
  .result .ok-badge { color: var(--green); font-size: 0.8em; }
  .result .err-badge { color: var(--red); font-size: 0.8em; }
  .result a.download { display: inline-block; background: var(--green); color: #0b1220; padding: 8px 14px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.85em; }
  .note { color: var(--muted); font-size: 0.85em; }
  .raw-list .card { background: var(--card); border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; }
  .raw-list .card h2 { margin-top: 0; color: var(--yellow); font-size: 1.1em; text-transform: capitalize; }
  .raw-route { display: flex; gap: 10px; align-items: center; font-family: monospace; padding: 4px 0; border-top: 1px solid var(--border); font-size: 0.85em; }
  .raw-route:first-of-type { border-top: none; }
  .method { padding: 2px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; }
  .GET { background: #166534; } .POST { background: #1d4ed8; }
  a { color: var(--accent); }
</style>
</head>
<body>
  <h1>🧰 Converter Toolkit Pro</h1>
  <p class="subtitle">Semua tools berjalan 100% lokal di komputer kamu. Pilih kategori sesuai peran kamu, isi form, klik Jalankan.</p>

  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="engineer">🔧 Engineer &amp; Programmer</button>
    <button class="tab-btn" data-tab="analyst">📊 Data Analyst</button>
    <button class="tab-btn" data-tab="dba">🗄️ Database Expert</button>
    <button class="tab-btn" data-tab="network">🌐 Network Integration</button>
    <button class="tab-btn" data-tab="docs">📄 Dokumen &amp; File</button>
    <button class="tab-btn" data-tab="raw">📋 Semua Endpoint (Lengkap)</button>
  </div>

  <div id="panels"></div>

                {name:"algo", label:"Algoritma", type:"select", options:["gzip","bzip2","lzma"]}] },
      { id:"file-decompress", title:"Dekompres 1 File", desc:"Kembalikan file .gz/.bz2/.xz ke bentuk asli.", method:"form",
        endpoint:"/api/compress/file-decompress",
        fields:[{name:"file", label:"File terkompresi", type:"file"},
                {name:"algo", label:"Algoritma", type:"select", options:["gzip","bzip2","lzma"]}] },
      { id:"compress-compare", title:"Bandingkan Algoritma Kompresi", desc:"Cek gzip vs bzip2 vs lzma vs zip, mana paling kecil.", method:"form",
        endpoint:"/api/compress/compare",
        fields:[{name:"file", label:"Pilih file", type:"file"}] },
      // --- QR & Barcode ---
      { id:"qr-generate", title:"Generate QR Code", desc:"Buat QR code dari teks/link apapun.", method:"json",
        endpoint:"/api/qr/generate",
        fields:[{name:"text", label:"Teks / URL", type:"text", placeholder:"https://example.com"},
                {name:"error_correction", label:"Error correction", type:"select", options:["M","L","Q","H"]}] },
      { id:"qr-decode", title:"Scan / Decode QR Code", desc:"Upload gambar QR, baca isinya.", method:"form",
        endpoint:"/api/qr/decode",
        fields:[{name:"file", label:"File gambar QR", type:"file"}] },
      { id:"barcode-generate", title:"Generate Barcode", desc:"Buat barcode Code128/EAN13/dsb.", method:"json",
        endpoint:"/api/barcode/generate",
        fields:[{name:"text", label:"Teks/angka", type:"text"},
                {name:"type", label:"Tipe barcode", type:"select", options:["code128","ean13","ean8","code39"]}] },
    ],
  };

  // =====================================================================
  // RENDER FORM FIELD
  // =====================================================================
  function renderField(f) {
    const id = "f_" + Math.random().toString(36).slice(2, 9);
    let inner = "";
    if (f.type === "textarea") {
      inner = `<textarea name="${f.name}" id="${id}" placeholder="${f.placeholder||''}">${f.value||''}</textarea>`;
    } else if (f.type === "select") {
      inner = `<select name="${f.name}" id="${id}">` + f.options.map(o=>`<option value="${o}">${o}</option>`).join('') + `</select>`;
    } else if (f.type === "file") {
      inner = `<input type="file" name="${f.name}" id="${id}">`;
    } else if (f.type === "files") {
      inner = `<input type="file" name="${f.name}" id="${id}" multiple>`;
    } else if (f.type === "password") {
      inner = `<input type="password" name="${f.name}" id="${id}" value="${f.value||''}">`;
    } else if (f.type === "number") {
      inner = `<input type="number" name="${f.name}" id="${id}" value="${f.value!==undefined?f.value:''}">`;
    } else {
      inner = `<input type="text" name="${f.name}" id="${id}" placeholder="${f.placeholder||''}" value="${f.value||''}">`;
    }
    return `<div class="field"><label for="${id}">${f.label}</label>${inner}</div>`;
  }

  function parseFilename(disposition, fallback) {
    if (!disposition) return fallback;
    const m = /filename="?([^"]+)"?/.exec(disposition);
    return m ? m[1] : fallback;
  }

  async function runTool(tool, cardEl) {
    const resultEl = cardEl.querySelector(".result");
    const btn = cardEl.querySelector(".run-btn");
    btn.disabled = true;
    btn.textContent = "Memproses...";
    resultEl.innerHTML = "";

    try {
      let resp;
      const getVal = (name) => cardEl.querySelector(`[name="${name}"]`);

      if (tool.method === "get") {
        const params = new URLSearchParams();
        tool.fields.forEach(f => params.set(f.name, getVal(f.name).value));
        resp = await fetch(tool.endpoint + "?" + params.toString());
      } else if (tool.method === "json") {
        const body = {};
        tool.fields.forEach(f => {
          const el = getVal(f.name);
          body[f.name] = (f.type === "number") ? Number(el.value) : el.value;
        });
        resp = await fetch(tool.endpoint, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
      } else { // form
        const fd = new FormData();
        tool.fields.forEach(f => {
          const el = getVal(f.name);
          if (f.type === "file") {
            if (el.files[0]) fd.append(f.name, el.files[0]);
          } else if (f.type === "files") {
            for (const file of el.files) fd.append(f.name, file);
          } else {
            fd.append(f.name, el.value);
          }
        });
        resp = await fetch(tool.endpoint, { method: "POST", body: fd });
      }

      const ct = resp.headers.get("content-type") || "";
      if (ct.includes("application/json")) {
        const data = await resp.json();
        const badge = data.ok ? `<span class="ok-badge">✓ Berhasil</span>` : `<span class="err-badge">✗ Error</span>`;
        resultEl.innerHTML = `${badge}<pre>${JSON.stringify(data, null, 2)}</pre>`;
      } else {
        const blob = await resp.blob();
        if (!resp.ok) {
          resultEl.innerHTML = `<span class="err-badge">✗ Error (${resp.status})</span>`;
        } else {
          const filename = parseFilename(resp.headers.get("content-disposition"), "hasil.bin");
          const url = URL.createObjectURL(blob);
          resultEl.innerHTML = `<span class="ok-badge">✓ Berhasil</span><br><a class="download" href="${url}" download="${filename}">⬇ Download ${filename}</a>`;
        }
      }
    } catch (e) {
      resultEl.innerHTML = `<span class="err-badge">✗ Gagal: ${e.message}</span>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "Jalankan";
    }
  }

  function renderPersonaTab(key) {
    const tools = TOOLS[key];
    const grid = document.createElement("div");
    grid.className = "tool-grid";
    tools.forEach(tool => {
      const card = document.createElement("div");
      card.className = "tool-card";
      card.innerHTML = `
        <h3>${tool.title}</h3>
        <p class="desc">${tool.desc}</p>
        <form onsubmit="return false;">
          ${tool.fields.map(renderField).join("")}
          <button type="submit" class="run-btn">Jalankan</button>
        </form>
        <div class="result"></div>
      `;
      card.querySelector("form").addEventListener("submit", () => runTool(tool, card));
      grid.appendChild(card);
    });
    const panel = document.createElement("div");
    panel.className = "tab-panel";
    panel.id = "panel-" + key;
    panel.appendChild(grid);
    return panel;
  }

  function renderRawTab(groups) {
    const panel = document.createElement("div");
    panel.className = "tab-panel raw-list";
    panel.id = "panel-raw";
    panel.innerHTML = `<p class="note">Daftar teknis semua endpoint API (untuk dipanggil lewat curl/Postman/frontend sendiri).</p>`;
    Object.entries(groups).forEach(([module, routes]) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<h2>${module.replace(/_/g, ' ')}</h2>` + routes.map(r =>
        `<div class="raw-route">${r.methods.map(m=>`<span class="method ${m}">${m}</span>`).join('')}<code>${r.path}</code></div>`
      ).join("");
      panel.appendChild(card);
    });
    return panel;
  }

  // =====================================================================
  // INIT
  // =====================================================================
  const RAW_GROUPS = {{ groups|tojson }};
  const panelsRoot = document.getElementById("panels");
  Object.keys(TOOLS).forEach(key => panelsRoot.appendChild(renderPersonaTab(key)));
  panelsRoot.appendChild(renderRawTab(RAW_GROUPS));
  document.getElementById("panel-engineer").classList.add("active");

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
    });
  });
  </script>
</body>
</html>
